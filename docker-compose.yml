services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trie
      POSTGRES_PASSWORD: trie
      POSTGRES_DB: trie
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trie -d trie"]
      interval: 2s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      TRIE_DATABASE_URL: postgresql+asyncpg://trie:trie@db:5432/trie
      TRIE_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      # Build-time, not runtime: see frontend/Dockerfile. This is the URL the
      # browser calls, so it must be reachable from the host, not from the
      # compose network.
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
