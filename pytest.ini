[pytest]
# `.` exposes ai/, `backend` exposes app/ — matching the PYTHONPATH the
# backend runs with in backend/Dockerfile.
pythonpath = . backend
testpaths = tests
markers =
    model: exercises a real ML model (YOLO/MediaPipe) rather than a fake. Needs
        torch/ultralytics/mediapipe installed and, on first run, network access
        to download weights. Excluded from the default fast run: `pytest -m
        "not model"` is what CI's quick job runs; `pytest -m model` runs only
        these.
